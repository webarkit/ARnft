name: Build ARnft dist library

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch.
# The action script will build the dist/ARnft.js and commit the file. When a new git tag is created
# will be made a new release.
on: push

jobs:
    build:
        runs-on: ubuntu-24.04

        strategy:
            matrix:
                node-version:
                    - 22.13.0
        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
            - uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/yarn
                      **/node_modules
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-
            - name: Set output
              id: vars
              run: echo name=tag::${GITHUB_REF#refs/*/} >> $GITHUB_OUTPUT
            - name: Check output
              env:
                  RELEASE_VERSION: ${{ steps.vars.outputs.tag }}
              run: |
                  echo $RELEASE_VERSION
                  echo ${{ steps.vars.outputs.tag }}
            - run: |
                  yarn
            - uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist
            - run: |
                  yarn build-ts
            - name: Commit changes
              if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
              uses: EndBug/add-and-commit@v9
              with:
                  default_author: github_actions
                  message: new dist files from action
                  add: "dist"
            - name: Release
              uses: softprops/action-gh-release@v2
              if: startsWith(github.ref, 'refs/tags/')
              with:
                  files: |
                      dist/ARnft.js
                      dist/ARnft.mjs
